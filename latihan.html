<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Latihan</title>

  <style>
    body {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      font-family: 'Khand', sans-serif;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }

    #background {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #background .bg-track {
      display: flex;
      width: 200%;
      height: 100%;
      gap: 30px;
      animation: bgScroll 180s linear infinite;
    }

    #background .bg-track img {
      width: calc(50% - 15px);
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }

    @keyframes bgScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.4);
    }

    .card {
      position: relative;
      width: 1536px;
      height: 100px;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .profile-pic img {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 85px;
      height: 80px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 1;
    }

    .profile-pic img:hover {
      transform: scale(1.1);
      transition: transform 0.3s ease;
      transform: opacity 0.8s ease;
      opacity: 0.8;
    }

    .profile-pic button {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 80px;
      height: 80px;
      left: 1400px;
      bottom: 90px;
      border-radius: 50%;
      z-index: 3;
      border: none;
      background: none;
    }

    .logo img {
      position: relative;
      display: flex;
      align-items: left;
      justify-content: left;
      width: 160px;
      height: 160px;
      bottom: 255px;
      left: 20px;
      z-index: 1;
    }

    .full {
      width: 100%;
    }

    .btn {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn button {
      width: 264px;
      height: 100px;
      border-radius: 0px;
      border: none;
      background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
      color: white;
      font-size: 30px;
      cursor: pointer;
      transform: skewX(-25deg);
      z-index: 2;
    }

    .btn button span {
      display: inline-block;
      transform: skewX(25deg);
    }

    .btn button:hover {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .btn button:active {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    /* ── TAMBAHAN: main card ── */
    .main-card {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 87%;
      max-width: 960px;
      height: calc(100vh - 160px);
      background: #ffffff;
      border-radius: 20px;
      box-shadow: inset 0px 0px 50px 3px rgba(0, 0, 0, 0.25);
      z-index: 2;
      box-sizing: border-box;
      padding: 18px;
      overflow: hidden;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .video-thumb {
      background: linear-gradient(135deg, #c8cad8 0%, #e8eaf0 60%, #d0d2de 100%);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .video-thumb:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 18px rgba(0, 0, 150, 0.18);
    }

    .video-play-icon {
      width: 38px;
      height: 38px;
      background: rgba(0, 4, 153, 0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-play-icon::after {
      content: "";
      display: block;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 14px solid rgba(0, 4, 153, 0.55);
      margin-left: 4px;
    }

    .video-label {
      font-family: 'Khand', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 4, 100, 0.5);
      letter-spacing: 0.5px;
      text-align: center;
      padding: 0 6px;
    }

    .video-duration {
      position: absolute;
      bottom: 6px;
      right: 8px;
      background: rgba(0, 0, 0, 0.28);
      color: #fff;
      font-size: 11px;
      font-family: 'Khand', sans-serif;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #e0e0e0;
      border-top: 6px solid #2C30E2;
      border-radius: 50%;
      animation: loadingSpin 0.8s linear infinite;
    }

    @keyframes loadingSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* ── TAMBAHAN: Styles untuk Video Modal & Hover Overlay ── */
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 2, 66, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.3s ease;
      z-index: 2;
    }

    .video-thumb:hover .video-overlay {
      background: rgba(0, 2, 66, 0.65);
    }

    .video-overlay .video-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 15px;
      text-transform: uppercase;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .video-thumb:hover .video-label {
      color: #ffffff;
      transform: scale(1.05);
    }

    .video-overlay .video-play-icon {
      background: rgba(255, 255, 255, 0.25);
      transition: background-color 0.3s ease, transform 0.3s ease;
    }

    .video-overlay .video-play-icon::after {
      border-left-color: #ffffff;
    }

    .video-thumb:hover .video-play-icon {
      background: #ffffff;
      transform: scale(1.1);
    }

    .video-thumb:hover .video-play-icon::after {
      border-left-color: #000499;
    }

    .video-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .video-modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .video-modal-content {
      background: linear-gradient(135deg, #000242 0%, #000499 100%);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 850px;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .video-modal.active .video-modal-content {
      transform: scale(1);
    }

    .video-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .video-modal-title {
      font-size: 28px;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 0;
    }

    .video-modal-close {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .video-modal-close:hover {
      background: #ffffff;
      color: #000499;
      transform: scale(1.1);
    }

    .video-modal-body {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .video-modal-body video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
  </style>
</head>

<script>
  function pindah1() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "beranda.html"; }, 500);
  }
  function pindah2() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "latihan.html"; }, 500);
  }
  function pindah3() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "statistik.html"; }, 500);
  }
  function pindah4() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "jadwal.html"; }, 500);
  }
  document.addEventListener('DOMContentLoaded', async () => {
    showLoading();
    try {
      const user = await window.striveAPI.getCurrentUser();
      hideLoading();
      if (user && user.profile_pic) {
        document.getElementById('header-profile-pic').src = user.profile_pic;
      }
    } catch (e) { console.error(e); hideLoading(); }

    // Close modal on background click
    const modal = document.getElementById('video-modal');
    if (modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeVideoModal();
        }
      });
    }
  });

  function showLoading() {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'loading-overlay';
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-spinner"></div>';
      document.body.appendChild(overlay);
    }
    overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.classList.remove('active');
  }

  function openVideoModal(videoSrc, videoTitle) {
    const modal = document.getElementById('video-modal');
    const modalTitle = document.getElementById('video-modal-title');
    const modalVideo = document.getElementById('video-modal-player');
    const modalSource = document.getElementById('video-modal-source');

    modalTitle.textContent = videoTitle;
    modalSource.src = videoSrc;
    modalVideo.load();
    modal.classList.add('active');
    modalVideo.play().catch(err => console.log('Autoplay blocked:', err));
  }

  function closeVideoModal() {
    const modal = document.getElementById('video-modal');
    const modalVideo = document.getElementById('video-modal-player');
    
    modal.classList.remove('active');
    modalVideo.pause();
  }
</script>

<body>

      <button onclick="pindah4()"><span>JADWAL</span></button>
    </div>

  <div class="profile-pic">
