<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Latihan</title>

  <style>
    body {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      font-family: 'Khand', sans-serif;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }

    #background img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.4);
    }

    .card {
      position: relative;
      width: 1536px;
      height: 100px;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .profile-pic img {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 85px;
      height: 80px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 1;
    }

    .profile-pic img:hover {
      transform: scale(1.1);
      transition: transform 0.3s ease;
      transform: opacity 0.8s ease;
      opacity: 0.8;
    }

    .profile-pic button {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 80px;
      height: 80px;
      left: 1400px;
      bottom: 90px;
      border-radius: 50%;
      z-index: 3;
      border: none;
      background: none;
    }

    .logo img {
      position: relative;
      display: flex;
      align-items: left;
      justify-content: left;
      width: 160px;
      height: 160px;
      bottom: 255px;
      left: 20px;
      z-index: 1;
    }

    .full {
      width: 100%;
    }

    .btn {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn button {
      width: 264px;
      height: 100px;
      border-radius: 0px;
      border: none;
      background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
      color: white;
      font-size: 30px;
      cursor: pointer;
      transform: skewX(-25deg);
      z-index: 2;
    }

    .btn button span {
      display: inline-block;
      transform: skewX(25deg);
    }

    .btn button:hover {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .btn button:active {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    /* ── TAMBAHAN: main card ── */
    .main-card {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 87%;
      max-width: 960px;
      height: calc(100vh - 160px);
      background: #ffffff;
      border-radius: 20px;
      box-shadow: inset 0px 0px 50px 3px rgba(0, 0, 0, 0.25);
      z-index: 2;
      box-sizing: border-box;
      padding: 18px;
      overflow: hidden;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .video-thumb {
      background: linear-gradient(135deg, #c8cad8 0%, #e8eaf0 60%, #d0d2de 100%);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .video-thumb:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 18px rgba(0, 0, 150, 0.18);
    }

    .video-play-icon {
      width: 38px;
      height: 38px;
      background: rgba(0, 4, 153, 0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-play-icon::after {
      content: "";
      display: block;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 14px solid rgba(0, 4, 153, 0.55);
      margin-left: 4px;
    }

    .video-label {
      font-family: 'Khand', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 4, 100, 0.5);
      letter-spacing: 0.5px;
      text-align: center;
      padding: 0 6px;
    }

    .video-duration {
      position: absolute;
      bottom: 6px;
      right: 8px;
      background: rgba(0, 0, 0, 0.28);
      color: #fff;
      font-size: 11px;
      font-family: 'Khand', sans-serif;
      padding: 1px 5px;
      border-radius: 4px;
    }
  </style>
</head>

<script>
  function pindah1() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "beranda.html"; }, 500);
  }
  function pindah2() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "latihan.html"; }, 500);
  }
  function pindah3() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "statistik.html"; }, 500);
  }
  function pindah4() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "jadwal.html"; }, 500);
  }
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const user = await window.striveAPI.getCurrentUser();
      if (user && user.profile_pic) {
        document.getElementById('header-profile-pic').src = user.profile_pic;
      }
    } catch (e) { console.error(e); }
  });
</script>

<body>
  <div class="card">
    <div class="header"></div>
    <div class="btn">
      <button onclick="pindah1()"><span>BERANDA</span></button>
      <button onclick="pindah2()"><span>LATIHAN</span></button>
      <button onclick="pindah3()"><span>STATISTIK</span></button>
      <button onclick="pindah4()"><span>JADWAL</span></button>
    </div>
  </div>
  <div class="profile-pic">
    <button onclick="window.location.href='profile.html'"><img id="header-profile-pic" src="Profile.png"
        alt="Profile Picture"></button>
  </div>
  <div class="logo">
    <img src="Strive.png">
  </div>

  <!-- ── TAMBAHAN: card utama dengan 12 video ── -->
  <div class="main-card">
    <div class="video-grid">
      <div class="video-thumb"><video width="100%" height="100%" controls poster="PushUp.png"
          style="border-radius: 10px; object-fit: cover;">
          <source src="PushUp.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video2.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video3.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video4.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video5.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video6.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video7.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video8.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video9.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video10.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video11.mp4" type="video/mp4">
        </video></div>
      <div class="video-thumb"><video width="100%" height="100%" controls
          style="border-radius: 10px; object-fit: cover;">
          <source src="video12.mp4" type="video/mp4">
        </video></div>
    </div>
  </div>

  <div id="background">
    <img src="BackgroundStrive.png" alt="Background Image"
      style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
  </div>
</body>

</html>
