<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Statistik</title>

  <style>
    body {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      font-family: 'Khand', sans-serif;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }

    #background {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #background .bg-track {
      display: flex;
      width: 200%;
      height: 100%;
      gap: 30px;
      animation: bgScroll 180s linear infinite;
    }

    #background .bg-track img {
      width: calc(50% - 15px);
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }

    @keyframes bgScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* overlay biar agak soft */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.4);
    }

    /* header */
    .card {
      position: relative;
      width: 1536px;
      height: 100px;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .profile-pic img {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 85px;
      height: 80px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 1;
    }

    .profile-pic img:hover {
      transform: scale(1.1);
      transition: transform 0.3s ease;
      transform: opacity 0.8s ease;
      opacity: 0.8;
    }

    .profile-pic button {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 80px;
      height: 80px;
      left: 1400px;
      bottom: 90px;
      border-radius: 50%;
      z-index: 3;
      border: none;
      background: none;
    }

    /* logo */
    .logo img {
      position: relative;
      display: flex;
      align-items: left;
      justify-content: left;
      width: 160px;
      height: 160px;
      bottom: 255px;
      left: 20px;
      z-index: 1;
    }

    /* input full */
    .full {
      width: 100%;
    }

    /* button */
    .btn {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn button {
      width: 264px;
      height: 100px;
      border-radius: 0px;
      border: none;
      background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
      color: white;
      font-size: 30px;
      cursor: pointer;
      transform: skewX(-25deg);
      z-index: 2;
    }

    .btn button span {
      display: inline-block;
      transform: skewX(25deg);
    }

    .btn button:hover {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .btn button:active {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .chart-container {
      position: absolute;
      top: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1300px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: inset 0px 0px 50px 3px rgba(0, 0, 0, 0.25);
      padding: 28px 32px 24px 32px;
      z-index: 2;
      box-sizing: border-box;
    }

    .chart-title {
      font-family: 'Khand', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #000499;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .chart-legend {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
    }

    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: #555;
      font-family: 'Khand', sans-serif;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .loading-spinner {
      width: 60px; height: 60px;
      border: 6px solid #e0e0e0;
      border-top: 6px solid #2C30E2;
      border-radius: 50%;
      animation: loadingSpin 0.8s linear infinite;
    }
    @keyframes loadingSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<script>
  function pindah1() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "beranda.html"; }, 100);
  }
  function pindah2() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "latihan.html"; }, 100);
  }
  function pindah3() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "statistik.html"; }, 100);
  }
  function pindah4() {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = "jadwal.html"; }, 100);
  }
  document.addEventListener('DOMContentLoaded', async () => {
    showLoading();
    try {
      const user = await window.striveAPI.getCurrentUser();
      hideLoading();
      if (user && user.profile_pic) {
        document.getElementById('header-profile-pic').src = user.profile_pic;
      }
    } catch (e) { console.error(e); hideLoading(); }

    // ── Chart.js ──
    const ctx = document.getElementById('weeklyChart').getContext('2d');

    const userId = localStorage.getItem('strive_user_id') || 'guest';
    const chartDataKey = 'strive_chart_data_' + userId;

    // Ambil data chart dari localStorage atau gunakan default
    let chartData = JSON.parse(localStorage.getItem(chartDataKey)) || [0, 0, 0, 0];
    while (chartData.length < 4) chartData.push(0);

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Minggu 1', 'Minggu 2', 'Minggu 3', 'Minggu 4'],
        datasets: [
          {
            label: 'Latihan Dilakukan',
            data: chartData,
            backgroundColor: function(context) {
              const chart = context.chart;
              const { ctx, chartArea } = chart;
              if (!chartArea) return '#cccccc';
              const colors = ['#FF5757', '#FFE957', '#84FF57', '#cccccc'];
              const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
              gradient.addColorStop(0, colors[context.dataIndex]);
              gradient.addColorStop(1, '#ffffff');
              return gradient;
            },
            borderRadius: 4,
            barThickness: 40,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y} sesi`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            max: 7,
            ticks: {
              stepSize: 1,
              font: { family: 'Khand', size: 14 }
            },
            grid: { color: 'rgba(0,0,0,0.07)' }
          },
          x: {
            ticks: { font: { family: 'Khand', size: 15 } },
            grid: { display: false }
          }
        }
      }
    });
  });

  function showLoading() {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'loading-overlay';
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-spinner"></div>';
      document.body.appendChild(overlay);
    }
    overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.classList.remove('active');
  }
</script>

<body>
  <div class="card">
    <div class="header"></div>
    <div class="btn">
      <button onclick="pindah1()"><span>BERANDA</span></button>
      <button onclick="pindah2()"><span>LATIHAN</span></button>
      <button onclick="pindah3()"><span>STATISTIK</span></button>
      <button onclick="pindah4()"><span>JADWAL</span></button>
    </div>
  </div>
  <div class="profile-pic">
    <button onclick="window.location.href='profile.html'"><img id="header-profile-pic" src="Profile.png"
        alt="Profile Picture"></button>
  </div>
  <div class="logo">
    <img src="Strive.png">
  </div>

  <!-- ── TAMBAHAN: card chart ── -->
  <div class="chart-container">
    <div class="chart-title">STATISTIK LATIHAN MINGGUAN</div>
    <div class="chart-legend">
      <div class="chart-legend-item">
        <div class="legend-dot" style="background:#FF5757"></div>Minggu 1
      </div>
      <div class="chart-legend-item">
        <div class="legend-dot" style="background:#FFE957"></div>Minggu 2
      </div>
      <div class="chart-legend-item">
        <div class="legend-dot" style="background:#84FF57"></div>Minggu 3
      </div>
      <div class="chart-legend-item">
        <div class="legend-dot" style="background:#cccccc"></div>Minggu 4
      </div>
    </div>
    <canvas id="weeklyChart" height="110"></canvas>
  </div>

  <div id="background">
    <div class="bg-track">
      <img src="BackgroundStrive.png" alt="Background Image">
      <img src="BackgroundStrive.png" alt="Background Image">
    </div>
  </div>
</body>

</html>
