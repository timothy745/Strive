<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Strive Personal Info</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Khand', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* background */
#background img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* overlay biar agak soft */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.4);
}

/* card */
.card {
    position: relative;
    width: 400px;
    border-radius: 22px;
    background: linear-gradient(to bottom, #f7f7f7, #e9e9e9);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    overflow: hidden;
    z-index: 1;
}

/* header */
.header {
    height: 120px;
    background: linear-gradient(180deg, #000286 0%, #4A4EFF 83%, #8689FF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* logo */
.logo img {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -115px;
    padding-left: 15px;
    gap: 10px;
}

/* form */
.form {
    padding: 25px;
}

/* input umum */
.input-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.input-box input,
.input-box select {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    border: none;
    outline: none;
    background: linear-gradient(to bottom, #e5e5e5, #d6d6d6) ;
    box-shadow: 
        inset 0 2px 6px rgba(0,0,0,0.2),
        inset 0 -2px 3px rgba(255,255,255,0.7);
    font-size: 16px;
    color: #555;
}
.input-box span.berat {
    position: absolute;
    right: 225px;
    top: 287px;
    font-size: 14px;
    color: #555;
}

.input-box span.tinggi {
    position: absolute;
    right: 40px;
    top: 287px;
    font-size: 14px;
    color: #555;
}

/* input full */
.full {
    width: 100%;
}

/* button */
.btn {
    display: flex;
    justify-content: flex-end;
}

.btn button {
    width: 130px;
    height: 45px;
    border-radius: 25px;
    border: none;
    background: #2C30E2;
    color: white;
    font-size: 18px;
    cursor: pointer;

    box-shadow: 
        0 8px 18px rgba(0,0,255,0.4),
        inset 0 -4px 6px rgba(0,0,0,0.25);
}

.btn button:active {
    transform: scale(0.95);
}

</style>
</head>

<body>

 <div id="background">
    <img src="BackgroundStrive.png" alt="Background Image" style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
  </div>

<div class="card">
    
    <div class="header">
        <div class="logo">
            <img src="Strive.png"> <!-- pakai logo kamu -->

    </div>

    <div class="form">

    <!-- TAHUN (pakai number, paling mendekati) -->

        <!-- Berat & Tinggi -->

        <!-- Button -->
        <div class="btn">
            <button onclick="window.location.href='beranda.html'">SAVE</button>

</div>

</body>
</html>
