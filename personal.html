<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Strive Personal Info</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Khand', sans-serif;
        }

        body {
            transition: 0.5s;
            transform: translateY(100%);
            opacity: 0;
            animation: slideIn 0.5s forwards;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-out {
            animation: slideOut 0.5s forwards;
        }

        @keyframes slideOut {
            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        #background {
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #background .bg-track {
            display: flex;
            width: 200%;
            height: 100%;
      gap: 30px;
            animation: bgScroll 180s linear infinite;
        }

        #background .bg-track img {
            width: calc(50% - 15px);
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }

        @keyframes bgScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* overlay biar agak soft */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
        }

        /* card */
        .card {
            position: relative;
            width: 400px;
            border-radius: 22px;
            background: #FFFFFF;
            box-shadow: inset 0px 0px 50px 2px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            z-index: 1;
        }

        /* header */
        .header {
            height: 120px;
            background: linear-gradient(180deg, #000286 0%, #4A4EFF 83%, #8689FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* logo */
        .logo img {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -115px;
            padding-left: 15px;
            gap: 30px;
        }

        /* form */
        .form {
            padding: 25px;
        }

        /* input umum */
        .input-box {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }

        .input-box input,
        .input-box select {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: linear-gradient(to bottom, #e5e5e5, #d6d6d6);
            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.2),
                inset 0 -2px 3px rgba(255, 255, 255, 0.7);
            font-size: 16px;
            color: #555;
        }

        .input-box span.berat {
            position: absolute;
            right: 225px;
            top: 287px;
            font-size: 14px;
            color: #555;
        }

        .input-box span.tinggi {
            position: absolute;
            right: 40px;
            top: 287px;
            font-size: 14px;
            color: #555;
        }

        /* input full */
        .full {
            width: 100%;
        }

        /* button */
        .btn {
            display: flex;
            justify-content: flex-end;
        }

        .btn button {
            width: 130px;
            height: 45px;
            border-radius: 25px;
            border: none;
            background: #2C30E2;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .btn button:hover {
            background: #FFFFFF;
            color: #2C30E2;
            box-shadow: 0 0px 20px rgba(0, 0, 0, 0.2);
        }

        .btn button:active {
            transform: scale(0.95);
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 15px;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            z-index: 10;
            font-size: 30px;
            transition: transform 0.2s;
            user-select: none;
        }

        .back-btn:hover {
            transform: scale(1.1);
            transform: translateY(-50%);
            color: #ccc;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .toast-item {
            position: relative;
            background: #FFFFFF;
            box-shadow: inset 0px 0px 15px 3px rgba(0, 0, 0, 0.25);
            border: 2px solid;
            min-width: 280px;
            padding: 16px 24px;
            border-radius: 8px;
            font-family: 'Khand', sans-serif;
            font-size: 18px;
            overflow: hidden;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .toast-item.show {
            transform: translateX(0);
        }

        .toast-item.hide {
            transform: translateX(120%);
            opacity: 0;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 100%;
            background: #cc0000;
            transform-origin: left;
            animation: toastProgress 3s linear forwards;
        }

        @keyframes toastProgress {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .loading-spinner {
            width: 60px; height: 60px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #2C30E2;
            border-radius: 50%;
            animation: loadingSpin 0.8s linear infinite;
        }
        @keyframes loadingSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div id="background">
        <div class="bg-track">
            <img src="BackgroundStrive.png" alt="Background Image">
            <img src="BackgroundStrive.png" alt="Background Image">
        </div>
    </div>

    <div class="card">

        <div class="header">
            <span class="material-symbols-outlined back-btn" onclick="goBack()">arrow_back</span>
            <div class="logo">
                <img src="Strive.png">
            </div>
        </div>

        <div class="form">
            <div class="input-box">
                <input class="full" type="text" id="input-nama" placeholder="Nama">
            </div>
            <div class="input-box">
                <select id="input-tgl" style="width: 70px;">
                    <option>Tgl</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                    <option>16</option>
                    <option>17</option>
                    <option>18</option>
                    <option>19</option>
                    <option>20</option>
                    <option>21</option>
                    <option>22</option>
                    <option>23</option>
                    <option>24</option>
                    <option>25</option>
                    <option>26</option>
                    <option>27</option>
                    <option>28</option>
                    <option>29</option>
                    <option>30</option>
                    <option>31</option>
                </select>

                <select id="input-bulan">
                    <option>Bulan</option>
                    <option>Januari</option>
                    <option>Februari</option>
                    <option>Maret</option>
                    <option>April</option>
                    <option>Mei</option>
                    <option>Juni</option>
                    <option>Juli</option>
                    <option>Agustus</option>
                    <option>September</option>
                    <option>Oktober</option>
                    <option>November</option>
                    <option>Desember</option>
                </select>
                <input type="number" id="input-tahun" placeholder="Tahun" min="1900" max="2100">
            </div>
            <div class="input-box">
                <input type="number" id="input-berat" placeholder="Berat Badan" min="0" step="0.1">
                <span class="berat">Kg</span>
                <input type="number" id="input-tinggi" placeholder="Tinggi Badan" min="0" step="0.1">
                <span class="tinggi">Cm</span>
            </div>
            <div class="btn">
                <button id="save-btn">SAVE</button>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('save-btn').addEventListener('click', async () => {
            const nama = document.getElementById('input-nama').value;
            const tgl = document.getElementById('input-tgl').value;
            const bulan = document.getElementById('input-bulan').value;
            const tahun = document.getElementById('input-tahun').value;
            const weightStr = document.getElementById('input-berat').value;
            const heightStr = document.getElementById('input-tinggi').value;

            // Form validasi simple
            if (!nama || tgl === "Tgl" || bulan === "Bulan" || !tahun || !weightStr || !heightStr) {
                showToast("Mohon isi semua data dengan lengkap!", "error");
                return;
            }

            // Tambah suffix " KG" dan " Cm"
            const weight = weightStr + " KG";
            const height = heightStr + " Cm";

            showLoading();

            try {
                const result = await window.striveAPI.updateProfile({
                    nama, tgl, bulan, tahun, weight, height
                });
                hideLoading();

                if (result.success) {
                    showToast("Data berhasil disimpan!", "success");
                    setTimeout(() => { window.location.href = 'beranda.html'; }, 1000);
                } else {
                    showToast("Gagal menyimpan data: " + result.message, "error");
                }
            } catch (err) {
                console.error("Save error:", err);
                showToast("Terjadi kesalahan sistem saat menyimpan.", "error");
                hideLoading();
            }
        });

        function showLoading() {
            let overlay = document.getElementById('loading-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loading-overlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = '<div class="loading-spinner"></div>';
                document.body.appendChild(overlay);
            }
            overlay.classList.add('active');
        }
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.remove('active');
        }
        function showToast(message, type = 'error') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = 'toast-item';

            const origColor = type === 'success' ? '#00f024' : '#cc0000';

            toast.innerHTML = `
                <div style="position: relative; z-index: 1; color: ${origColor};">${message}</div>
                <div class="toast-progress" style="background: ${origColor};"></div>
            `;
            toast.style.borderColor = origColor;

            container.appendChild(toast);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 400);
            }, 3000);
        }

        function goBack() {
            document.body.classList.add("slide-out");
            setTimeout(() => {
                window.location.href = "registasi.html";
            }, 100);
        }
    </script>
</body>

</html>
