<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Beranda</title>

  <style>
    body {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      font-family: 'Khand', sans-serif;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }

    /* background */
    #background img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* overlay biar agak soft */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.4);
    }

    /* header */
    .card {
      position: relative;
      width: 1536px;
      height: 100px;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .profile-pic img {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 85px;
      height: 80px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 1;
    }

    .profile-pic img:hover {
      transform: scale(1.1);
      transition: transform 0.3s ease;
      transform: opacity 0.8s ease;
      opacity: 0.8;
    }

    .profile-pic button {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 80px;
      height: 80px;
      left: 1400px;
      bottom: 90px;
      border-radius: 50%;
      z-index: 3;
      border: none;
      background: none;
    }

    /* logo */
    .logo img {
      position: relative;
      display: flex;
      align-items: left;
      justify-content: left;
      width: 160px;
      height: 160px;
      bottom: 255px;
      left: 20px;
      z-index: 1;
    }

    /* input full */
    .full {
      width: 100%;
    }

    /* button */
    .btn {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn button {
      width: 264px;
      height: 100px;
      border-radius: 0px;
      border: none;
      background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
      color: white;
      font-size: 30px;
      cursor: pointer;
      transform: skewX(-25deg);
      z-index: 2;
    }

    .btn button span {
      display: inline-block;
      transform: skewX(25deg);
    }

    .btn button:hover {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .btn button:active {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    /* ===== JADWAL WIDGET ===== */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    .jadwal-widget {
      position: relative;
      width: 1278px;
      height: 610px;
      left: 135px;
      margin-top: -170px;
      border-radius: 24px;
      background: #e8e8f0;
      border: 3px solid rgba(120, 140, 255, 0.5);
      box-shadow: 0 0 0 6px rgba(160, 180, 255, 0.18), 0 8px 40px rgba(80,100,200,0.13);
      padding: 28px 36px 28px 36px;
      z-index: 2;
      box-sizing: border-box;
      overflow: hidden;
    }

    .jadwal-container {
      display: flex;
      flex-direction: row;
      gap: 24px;
      align-items: stretch;
      height: 100%;
    }

    /* Kiri: info + chart */
    .jadwal-left {
      flex: 0 0 320px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2px;
      order: 1;
    }

    .jadwal-week {
      font-family: 'Khand', sans-serif;
      font-size: 80px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .jadwal-today-label {
      font-family: 'Khand', sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: #555;
      line-height: 1.1;
    }

    .jadwal-date {
      font-family: 'Khand', sans-serif;
      font-size: 40px;
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    /* Bar chart wrapper dengan grid */
    .jadwal-chart-wrap {
      flex: 1;
      position: relative;
      margin-top: 8px;
    }

    /* Grid lines */
    .chart-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      z-index: 0;
    }

    .chart-grid-line {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.12);
      position: relative;
    }

    .chart-grid-line::before {
      content: attr(data-val);
      position: absolute;
      left: -22px;
      top: -8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #888;
    }

    /* Bar chart */
    .jadwal-chart {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 18px;
      height: 100%;
      padding-bottom: 22px;
      padding-left: 24px;
    }

    .chart-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .chart-bar {
      width: 36px;
      border-radius: 3px 3px 0 0;
      transition: height 0.5s ease;
    }

    .chart-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: #666;
      font-weight: 400;
      white-space: nowrap;
    }

    /* Edit button */
    .jadwal-edit {
      position: absolute;
      top: 30px;
      right: 920px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 19px;
      color: #555;
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: 400;
      background: none;
      border: none;
      transition: color 0.2s;
    }

    .jadwal-edit:hover {
      color: #2C30E2;
    }

    /* Kanan: daftar latihan */
    .jadwal-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      order: 2;
      background: rgba(200, 205, 225, 0.5);
      border-radius: 14px;
      padding: 6px 0;
    }

    .jadwal-right::-webkit-scrollbar {
      width: 4px;
    }
    .jadwal-right::-webkit-scrollbar-track { background: transparent; }
    .jadwal-right::-webkit-scrollbar-thumb {
      background: rgba(100,120,255,0.3);
      border-radius: 4px;
    }

    .latihan-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(160, 165, 210, 0.3);
      gap: 8px;
      background: rgba(210, 215, 235, 0.45);
    }

    .latihan-item:last-child { border-bottom: none; }

    .latihan-text {
      font-family: 'Khand', sans-serif;
      font-size: 25px;
      color: #333;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .latihan-check {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1.5px solid rgba(150, 160, 220, 0.6);
      background: rgba(220, 225, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .latihan-check.checked {
      background: rgba(44, 48, 226, 0.15);
      border-color: #2C30E2;
    }

    .latihan-check svg {
      width: 13px;
      height: 13px;
      stroke: #2C30E2;
      display: none;
    }

    .latihan-check.checked svg {
      display: block;
    }
  </style>
</head>

<script>
  function pindah1() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "beranda.html";
    }, 100);
  }
  function pindah2() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "latihan.html";
    }, 100);
  }
  function pindah3() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "statistik.html";
    }, 100);
  }
  function pindah4() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "jadwal.html";
    }, 100);
  }
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const user = await window.striveAPI.getCurrentUser();
      if (user && user.profile_pic) {
        document.getElementById('header-profile-pic').src = user.profile_pic;
      }
    } catch (e) { console.error(e); }

    // Set tanggal hari ini
    const now = new Date();
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const day = now.getDate();
    const month = months[now.getMonth()];
    const year = now.getFullYear();

    // Hitung week of month
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    const weekNum = Math.ceil((day + firstDay) / 7);

    document.getElementById('jadwal-week').textContent = 'Week ' + weekNum;
    document.getElementById('jadwal-date').textContent = day + ', ' + month + ' ' + year;

    // Toggle checklist
    document.querySelectorAll('.latihan-check').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('checked');
      });
    });
  });
</script>

<body>
  <div class="card">
    <div class="header"></div>
    <div class="btn">
      <button onclick="pindah1()"><span>BERANDA</span></button>
      <button onclick="pindah2()"><span>LATIHAN</span></button>
      <button onclick="pindah3()"><span>STATISTIK</span></button>
      <button onclick="pindah4()"><span>JADWAL</span></button>
    </div>
  </div>
  <div class="profile-pic">
    <button onclick="window.location.href='profile.html'"><img id="header-profile-pic" src="Profile.png"
        alt="Profile Picture"></button>
  </div>
  <div class="logo">
    <img src="Strive.png">
  </div>

  <div id="background">
    <img src="BackgroundStrive.png" alt="Background Image"
      style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
  </div>

  <!-- ===== JADWAL WIDGET ===== -->
  <div class="jadwal-widget">
    <button class="jadwal-edit" onclick="pindah4()">EDIT --></button>

    <div class="jadwal-container">

      <!-- Kiri: info tanggal + chart dengan grid -->
      <div class="jadwal-left">
        <div class="jadwal-week" id="jadwal-week">Week 3</div>
        <div class="jadwal-today-label">Today</div>
        <div class="jadwal-date" id="jadwal-date">21, April 2026</div>

        <div class="jadwal-chart-wrap">
          <!-- Grid lines -->
          <div class="chart-grid">
            <div class="chart-grid-line" data-val="7"></div>
            <div class="chart-grid-line" data-val="6"></div>
            <div class="chart-grid-line" data-val="5"></div>
            <div class="chart-grid-line" data-val="4"></div>
            <div class="chart-grid-line" data-val="3"></div>
            <div class="chart-grid-line" data-val="2"></div>
            <div class="chart-grid-line" data-val="1"></div>
          </div>
          <!-- Bars -->
          <div class="jadwal-chart">
            <div class="chart-col">
              <div class="chart-bar" style="height:200px; background:#e05555;"></div>
              <span class="chart-label">Week 1</span>
            </div>
            <div class="chart-col">
              <div class="chart-bar" style="height:55px; background:#d4b800;"></div>
              <span class="chart-label">Week 2</span>
            </div>
            <div class="chart-col">
              <div class="chart-bar" style="height:175px; background:#3cb83c;"></div>
              <span class="chart-label">Week 3</span>
            </div>
            <div class="chart-col">
              <div class="chart-bar" style="height:4px; background:#aaa;"></div>
              <span class="chart-label">Week 4</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Kanan: daftar latihan -->
      <div class="jadwal-right">
        <div class="latihan-item">
          <span class="latihan-text">· 2 x Push up</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 2 x Sit up</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 3 x Pull up</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 3 x Squat</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 6 x Jumping Jack</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 7 x Moutain Climber</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 4 x Mengangkat Barbel (40 KG)</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 15 x Lompat Tali</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div class="latihan-item">
          <span class="latihan-text">· 16 x Back Up</span>
          <div class="latihan-check"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
      </div>

    </div>
  </div>
  <!-- ===== END JADWAL WIDGET ===== -->

</body>

</html>
