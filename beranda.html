<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Strive Personal Info</title>

<style>
* {
    margin: 0;
    padding: 0;
    font-family: 'Khand', sans-serif;
}
body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: block;
}

body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    height: 100vh;
}

/* background */
#background img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* overlay biar agak soft */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.4);
}

/* header */
.card {
    position: relative; 
    width: 1536px;
    height: 100px;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

/* logo */
.logo img {
    position: relative;
    display: flex;
    align-items: left;
    justify-content: left;
    width: 170px;
    height: 170px;
    bottom: 190px;
    left: 20px;
    z-index: 1;
}

/* input full */
.full {
    width: 100%;
}

/* button */
.btn {
    display: flex;
    justify-content: flex-end;
    gap: 20px;
}

.btn button {
    width: 264px;
    height: 100px;
    border-radius: 0px;
    border: none;
    background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
    color: white;
    font-size: 30px;
    cursor: pointer;
    transform: skewX(-25deg);
    z-index: 2;
}

.btn button span {
    display: inline-block;
    transform: skewX(25deg);
}
.btn button:hover {
    transform: color ease-in-out 0.1s;
    background: #ffffff;
    color: #2C30E2;
}

.btn button:active {
    transform: color ease-in-out 0.1s;
    background: #ffffff;
    color: #2C30E2;
}

</style>
</head>

<body>

<div class="card">
    <div class="header"></div>
    <div class="btn">
    <button onclick="window.location.href='beranda.html'"><span>BERANDA</span></button>
    <button onclick="window.location.href='latihan.html'"><span>LATIHAN</span></button>
    <button onclick="window.location.href='statistik.html'"><span>STATISTIK</span></button>
    <button onclick="window.location.href='jadwal.html'"><span>JADWAL</span></button>
    </div>
</div>

<div class="logo">
    <img src="Strive.png">
</div>

<div id="background">
    <img src="BackgroundStrive.png" alt="Background Image" style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
</div>
</body>
</html>
