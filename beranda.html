<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Beranda</title>

  <style>
    body {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .fade-out {
      animation: fadeOut 0.5s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      font-family: 'Khand', sans-serif;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }

    #background img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.4);
    }

    .card {
      position: relative;
      width: 1536px;
      height: 100px;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #000242 0%, #000499 51%, #0005D6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .profile-pic img {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 85px;
      height: 80px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 1;
    }

    .profile-pic img:hover {
      transform: scale(1.1);
      transition: transform 0.3s ease;
      transform: opacity 0.8s ease;
      opacity: 0.8;
    }

    .profile-pic button {
      position: relative;
      display: flex;
      align-items: right;
      justify-content: right;
      width: 80px;
      height: 80px;
      left: 1400px;
      bottom: 90px;
      border-radius: 50%;
      z-index: 3;
      border: none;
      background: none;
    }

    .logo img {
      position: relative;
      display: flex;
      align-items: left;
      justify-content: left;
      width: 160px;
      height: 160px;
      bottom: 255px;
      left: 20px;
      z-index: 1;
    }

    .full {
      width: 100%;
    }

    .btn {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .btn button {
      width: 264px;
      height: 100px;
      border-radius: 0px;
      border: none;
      background: linear-gradient(90deg, #01036E 0%, #0106D4 100%);
      color: white;
      font-size: 30px;
      cursor: pointer;
      transform: skewX(-25deg);
      z-index: 2;
    }

    .btn button span {
      display: inline-block;
      transform: skewX(25deg);
    }

    .btn button:hover {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    .btn button:active {
      transform: color ease-in-out 0.1s;
      background: #ffffff;
      color: #2C30E2;
    }

    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro&display=swap');

    .jadwal-widget {
      position: relative;
      width: 1278px;
      height: 610px;
      left: 135px;
      margin-top: -170px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: inset 0px 0px 50px 3px rgba(0, 0, 0, 0.25);
      padding: 28px 36px 28px 36px;
      z-index: 2;
      box-sizing: border-box;
      overflow: hidden;
    }

    .jadwal-container {
      display: flex;
      flex-direction: row;
      gap: 24px;
      align-items: stretch;
      height: 100%;
    }

    /* Kiri: info + chart */
    .jadwal-left {
      flex: 0 0 320px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2px;
      order: 1;
    }

    .jadwal-week {
      font-family: "Kdam Thmor Pro", sans-serif;
      font-weight: 500;
      font-size: 30px;
      color: #000000;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .jadwal-today-label {
      font-family: "Kdam Thmor Pro", sans-serif;
      font-weight: 500;
      font-size: 50px;
      color: #000000;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .jadwal-date {
      font-family: "Kdam Thmor Pro", sans-serif;
      font-weight: 500;
      color: #000000;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .date-day {
      font-size: 70px;
    }

    .date-month {
      font-size: 50px;
    }

    .date-year {
      font-size: 50px;
    }

    /* Chart.js canvas wrapper */
    .jadwal-chart-wrap {
      flex: 1;
      position: relative;
      margin-top: 8px;
    }

    /* Edit button */
    .jadwal-edit {
      position: absolute;
      top: 30px;
      right: 920px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 19px;
      color: #555;
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: 400;
      background: none;
      border: none;
      transition: color 0.2s;
    }

    .jadwal-edit:hover {
      color: #2C30E2;
    }

    /* Kanan: daftar latihan */
    .jadwal-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      order: 2;
      border-radius: 14px;
      padding: 6px 0;
    }

    .jadwal-right::-webkit-scrollbar {
      width: 4px;
    }

    .jadwal-right::-webkit-scrollbar-track {
      background: transparent;
    }

    .jadwal-right::-webkit-scrollbar-thumb {
      background: rgba(100, 120, 255, 0.3);
      border-radius: 4px;
    }

    .latihan-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(160, 165, 210, 0.3);
      gap: 8px;
      background: #EEEEEE
    }

    .latihan-item:last-child {
      border-bottom: none;
    }

    .latihan-text {
      font-family: 'Khand', sans-serif;
      font-size: 25px;
      color: #000000;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .latihan-check {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1.5px solid rgba(150, 160, 220, 0.6);
      background: rgba(220, 225, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .latihan-check.checked {
      background: rgba(44, 48, 226, 0.15);
      border-color: #2C30E2;
    }

    .latihan-check svg {
      width: 13px;
      height: 13px;
      stroke: #2C30E2;
      display: none;
    }

    .latihan-check.checked svg {
      display: block;
    }
  </style>
</head>

<script>
  function pindah1() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "beranda.html";
    }, 100);
  }
  function pindah2() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "latihan.html";
    }, 100);
  }
  function pindah3() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "statistik.html";
    }, 100);
  }
  function pindah4() {
    document.body.classList.add("fade-out");
    setTimeout(() => {
      window.location.href = "jadwal.html";
    }, 100);
  }
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const user = await window.striveAPI.getCurrentUser();
      if (user && user.profile_pic) {
        document.getElementById('header-profile-pic').src = user.profile_pic;
      }
    } catch (e) { console.error(e); }

    // Set tanggal hari ini
    const now = new Date();
    const dayofweek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const day = now.getDate();
    const month = months[now.getMonth()];
    const year = now.getFullYear();

    // Hitung week of month
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    const weekNum = Math.ceil((day + firstDay) / 7);
    document.getElementById('jadwal-week').textContent = 'Week ' + weekNum;
    document.getElementById('jadwal-date').innerHTML = '<span class="date-day">' + day + '</span> <span class="date-month">' + ',' + month + '</span> <span class="date-year">' + year + '</span>';

    // ── Chart.js (same as statistik.html) ──
    const ctx = document.getElementById('berandaChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
        datasets: [
          {
            label: 'Latihan Dilakukan',
            data: [1, 1, 1, 0],
            backgroundColor: ['#FF5757', '#FFE957', '#84FF57', '#cccccc'],
            borderRadius: 4,
            barThickness: 40,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y} sesi`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            max: 7,
            ticks: {
              stepSize: 1,
              font: { family: 'Khand', size: 14 }
            },
            grid: { color: 'rgba(0,0,0,0.07)' }
          },
          x: {
            ticks: { font: { family: 'Khand', size: 15 } },
            grid: { display: false }
          }
        }
      }
    });

    // Toggle checklist logic moved inside dynamic rendering

    // --- Load Today's Schedule ---
    const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const todayName = dayNames[now.getDay()];
    const scheduleContainer = document.querySelector('.jadwal-right');

    const defaultItems = [
      { name: 'Push Up', reps: 2, done: false, hasKg: false },
      { name: 'Sit Up', reps: 2, done: false, hasKg: false },
      { name: 'Pull Up', reps: 3, done: false, hasKg: false },
      { name: 'Squat', reps: 3, done: false, hasKg: false },
      { name: 'Jumping Jack', reps: 6, done: false, hasKg: false },
      { name: 'Mountain Climber', reps: 7, done: false, hasKg: false },
      { name: 'Mengangkat Barbel', reps: 4, done: false, hasKg: true, kg: 40 },
      { name: 'Lompat Tali', reps: 15, done: false, hasKg: false },
      { name: 'Back Up', reps: 16, done: false, hasKg: false },
      { name: 'Sikap Kapal Terbang', reps: 10, done: false, hasKg: false },
    ];

    async function loadTodaySchedule() {
      try {
        let items = await window.striveAPI.getSchedule(todayName);
        if (!items || items.length === 0) {
          items = defaultItems.map(it => ({ ...it }));
        }
        renderSchedule(items);
      } catch (e) {
        console.error('Error loading schedule:', e);
        renderSchedule(defaultItems.map(it => ({ ...it })));
      }
    }

    function renderSchedule(items) {
      scheduleContainer.innerHTML = '';
      items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'latihan-item';

        const kgText = item.hasKg ? ` (${item.kg} KG)` : '';
        div.innerHTML = `
          <span class="latihan-text">· ${item.reps} x ${item.name}${kgText}</span>
          <div class="latihan-check ${item.done ? 'checked' : ''}" data-index="${index}">
            <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="2,6 5,9 10,3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
        `;

        const checkBtn = div.querySelector('.latihan-check');
        checkBtn.addEventListener('click', async () => {
          item.done = !item.done;
          checkBtn.classList.toggle('checked');

          // Save update back to DB
          try {
            await window.striveAPI.saveSchedule(todayName, items);
          } catch (err) {
            console.error('Failed to save schedule update:', err);
          }
        });

        scheduleContainer.appendChild(div);
      });
    }

    loadTodaySchedule();
  });
</script>

<body>
  <div class="card">
    <div class="header"></div>
    <div class="btn">
      <button onclick="pindah1()"><span>BERANDA</span></button>
      <button onclick="pindah2()"><span>LATIHAN</span></button>
      <button onclick="pindah3()"><span>STATISTIK</span></button>
      <button onclick="pindah4()"><span>JADWAL</span></button>
    </div>
  </div>
  <div class="profile-pic">
    <button onclick="window.location.href='profile.html'"><img id="header-profile-pic" src="Profile.png"
        alt="Profile Picture"></button>
  </div>
  <div class="logo">
    <img src="Strive.png">
  </div>

  <div id="background">
    <img src="BackgroundStrive.png" alt="Background Image"
      style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
  </div>

  <!-- ===== JADWAL WIDGET ===== -->
  <div class="jadwal-widget">
    <button class="jadwal-edit" onclick="pindah4()">EDIT --></button>

    <div class="jadwal-container">

      <!-- Kiri: info tanggal + chart dengan grid -->
      <div class="jadwal-left">
        <div class="jadwal-week" id="jadwal-week">Week 3</div>
        <div class="jadwal-today-label">Today</div>
        <div class="jadwal-date" id="jadwal-date">
          <div class="jadwal-date" id="jadwal-date"><span class="date-day">21</span> <span
              class="date-month">April</span> <span class="date-year">2026</span></div>
        </div>

        <div class="jadwal-chart-wrap">
          <canvas id="berandaChart"></canvas>
        </div>
      </div>

      <div class="jadwal-right">
        <!-- Data will be loaded dynamically from jadwal.html logic -->
      </div>

    </div>
  </div>

</body>

</html>
