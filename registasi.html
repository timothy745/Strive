<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&family=Khand:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <title>Registrasi</title>

  <style>
    body {
      transition: 0.5s;
    }

    body {
      transform: translateY(100%);
      opacity: 0;
      animation: slideIn 0.5s forwards;
    }

    @keyframes slideIn {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .slide-out {
      animation: slideOut 0.5s forwards;
    }

    @keyframes slideOut {
      to {
        transform: translateY(-100%);
        opacity: 0;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;
    }

    /* overlay putih seperti gambar */
    body:before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.78);
    }

    #background {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #background .bg-track {
      display: flex;
      width: 200%;
      height: 100%;
      gap: 30px;
      animation: bgScroll 180s linear infinite;
    }

    #background .bg-track img {
      width: calc(50% - 15px);
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }

    @keyframes bgScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* CARD */
    .card {
      position: relative;
      width: 400px;
      border-radius: 22px;
      background: #FFFFFF;
      box-shadow: inset 0px 0px 50px 2px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      z-index: 1;
    }

    /* HEADER */
    .header {
      height: 120px;
      background: linear-gradient(180deg, #000286 0%, #4A4EFF 83%, #8689FF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
    }

    /* LOGO TEXT */
    .logo {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -115px;
      padding-left: 15px;
      gap: 30px;
    }

    .arrow {
      width: 5px;
      height: 5px;
      border-top: 17px solid transparent;
      border-bottom: 17px solid transparent;
      border-left: 18px solid #eaeaea;
    }

    /* FORM */
    .form {
      padding: 20px 30px;
      text-align: center;
    }

    /* INPUT */
    .input-box {
      margin: 18px 0;
    }

    .input-box input {
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      border: none;
      outline: none;
      font: 100 14px 'Khand', sans-serif;
      background: linear-gradient(to bottom, #e5e5e5, #d6d6d6);

      /* efek halus */
      box-shadow:
        inset 0 2px 6px rgba(0, 0, 0, 0.2),
        inset 0 -2px 3px rgba(255, 255, 255, 0.7);

      text-align: left;
      font-size: 18px;
      color: #666;
    }

    /* REGISTER BUTTON */
    .register-btn button {
      margin-top: 25px;
      margin-bottom: 25px;
      width: 328px;
      border-radius: 30px;
      border: none;
      font: 600 16px 'Khand', sans-serif;
      background: #2C30E2;
      color: white;
      font-size: 60px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .register-btn button:hover {
      background: #FFFFFF;
      color: #2C30E2;
      box-shadow: 0 0px 20px rgba(0, 0, 0, 0.2);
    }

    .register-btn button:active {
      transform: scale(0.96);
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-10px);
      }

      40% {
        transform: translateX(10px);
      }

      60% {
        transform: translateX(-8px);
      }

      80% {
        transform: translateX(8px);
      }
    }

    .shake {
      animation: shake 0.4s ease !important;
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
    }

    .toast-item {
      position: relative;
      background: #FFFFFF;
      box-shadow: inset 0px 0px 15px 3px rgba(0, 0, 0, 0.25);
      border: 2px solid;
      min-width: 280px;
      padding: 16px 24px;
      border-radius: 8px;
      font-family: 'Khand', sans-serif;
      font-size: 18px;
      overflow: hidden;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
    }

    .toast-item.show {
      transform: translateX(0);
    }

    .toast-item.hide {
      transform: translateX(120%);
      opacity: 0;
    }

    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      width: 100%;
      background: #cc0000;
      transform-origin: left;
      animation: toastProgress 3s linear forwards;
    }

    @keyframes toastProgress {
      0% {
        width: 100%;
      }

      100% {
        width: 0%;
      }
    }

    .input-wrapper {
      position: relative;
    }

    .toggle-pw {
      position: relative;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    .material-symbols-outlined {
      position: relative;
      right: -140px;
      bottom: 25px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
    }

    .material-symbols-outlined:hover {
      color: #848488;
    }

    .back-btn {
      position: absolute;
      top: 50px;
      left: 15px;
      transform: translateY(-50%);
      color: white;
      cursor: pointer;
      z-index: 10;
      font-size: 30px;
      transition: transform 0.2s;
      user-select: none;
    }

    .back-btn:hover {
      transform: scale(1.1);
      transform: translateY(-50%);
      color: #ccc;
    }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .loading-spinner {
      width: 60px; height: 60px;
      border: 6px solid #e0e0e0;
      border-top: 6px solid #2C30E2;
      border-radius: 50%;
      animation: loadingSpin 0.8s linear infinite;
    }
    @keyframes loadingSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<script>
  async function handleRegister() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('registerBtn');

    if (!email || !password) {
      showToast('Email dan password harus diisi.', 'error');
      msg.className = 'msg error';
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      setTimeout(() => {
        card.style.animation = 'shake 0.4s ease';
      }, 10);
      return;
    }

    if (password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error');
      msg.className = 'msg error';
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      setTimeout(() => {
        card.style.animation = 'shake 0.4s ease';
      }, 10);
      return;
    }

    btn.disabled = true;
    msg.textContent = '';
    showLoading();

    try {
      const result = await window.striveAPI.register(email, password);
      hideLoading();
      if (result.success) {
        // Save session
        localStorage.setItem('strive_user_id', result.id.toString());

        showToast('Registrasi berhasil!', 'success');
        msg.className = 'msg success';
        // Redirect ke login setelah berhasil
        setTimeout(() => {
          document.body.classList.add("slide-out");
          setTimeout(() => { window.location.href = "personal.html"; }, 100);
        }, 1000);
      } else {
        showToast(result.message, 'error');
        msg.className = 'msg error';
        btn.disabled = false;
        const card = document.querySelector('.card');
        card.style.animation = 'none';
        setTimeout(() => {
          card.style.animation = 'shake 0.4s ease';
        }, 10);
      }
    } catch (err) {
      showToast('Gagal terhubung ke server.', 'error');
      msg.className = 'msg error';
      btn.disabled = false;
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      setTimeout(() => {
        card.style.animation = 'shake 0.4s ease';
      }, 10);
    } finally {
      hideLoading();
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleRegister();
  });

  function pindah2() {
    document.body.classList.add("slide-out");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 100);
  }

  function goBack() {
    document.body.classList.add("slide-out");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 100);
  }

  function showLoading() {
    let overlay = document.getElementById('loading-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'loading-overlay';
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-spinner"></div>';
      document.body.appendChild(overlay);
    }
    overlay.classList.add('active');
  }
  function hideLoading() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.classList.remove('active');
  }
  function showToast(message, type = 'error') {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      container.className = 'toast-container';
      document.body.appendChild(container);
    }

    const toast = document.createElement('div');
    toast.className = 'toast-item';

    // Theme combining: Warna dinamis untuk garis bawah (progress), border, dan teks
    const origColor = type === 'success' ? '#00f024' : '#cc0000';

    toast.innerHTML = `
      <div style="position: relative; z-index: 1; color: ${origColor};">${message}</div>
      <div class="toast-progress" style="background: ${origColor};"></div>
    `;
    toast.style.borderColor = origColor;

    container.appendChild(toast);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        toast.classList.add('show');
      });
    });

    setTimeout(() => {
      toast.classList.remove('show');
      toast.classList.add('hide');
      setTimeout(() => {
        if (toast.parentNode) {
          toast.parentNode.removeChild(toast);
        }
      }, 400);
    }, 3000);
  }
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.querySelector('.material-symbols-outlined');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility_off';
    }
  }
</script>

<body>

  <div id="background">
    <div class="bg-track">
      <img src="BackgroundStrive.png" alt="Background Image">
      <img src="BackgroundStrive.png" alt="Background Image">
    </div>
  </div>

  <div class="card">
    <div class="header">
      <span class="material-symbols-outlined back-btn" onclick="goBack()">arrow_back</span>
      <div class="logo">
        <img src="Strive.png" alt="Logo">
      </div>
    </div>
    <div class="form">
      <div class="input-box">
        <input type="email" id="email" placeholder="E-Mail">
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="material-symbols-outlined" onclick="togglePassword()">visibility_off</span>
      </div>

      <div class="msg" id="msg"></div>

      <div class="register-btn">
        <button id="registerBtn" onclick="handleRegister()">REGISTER</button>
      </div>
    </div>
  </div>
</body>

</html>
