<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Strive Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    
    position: relative;
}

/* overlay putih seperti gambar */
body:before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.78);
}

/* CARD */
.card {
    position: relative;
    width: 400px;
    border-radius: 22px;
    background: linear-gradient(to bottom, #f7f7f7, #e9e9e9);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    overflow: hidden;
    z-index: 1;
}

/* HEADER */
.header {
    height: 120px;
    background: linear-gradient(180deg, #000286 0%, #4A4EFF 83%, #8689FF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
}

/* LOGO TEXT */
.logo {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -115px;
    padding-left: 15px;
    gap: 10px;
}


/* PANAH CUSTOM */
.arrows {
    display: flex;
    gap: 5px;
}

.arrow {
    width: 5px;
    height: 5px;
    border-top: 17px solid transparent;
    border-bottom: 17px solid transparent;
    border-left: 18px solid #eaeaea;
}

/* FORM */
.form {
    padding: 20px 30px;
    text-align: center;
}

/* INPUT */
.input-box {
    margin: 18px 0;
}

.input-box input {
    width: 100%;
    padding: 14px;
    border-radius: 40px;
    border: none;
    outline: none;
    font: 100 14px 'Khand', sans-serif;
    background: linear-gradient(to bottom, #e5e5e5, #d6d6d6);

    /* efek halus */
    box-shadow: 
        inset 0 2px 6px rgba(0,0,0,0.2),
        inset 0 -2px 3px rgba(255,255,255,0.7);

    text-align: left;
    font-size: 18px;
    color: #666;
}

/* REGISTER BUTTON */
.register-btn button {
    margin-top: 25px;
    width: 328px;
    border-radius: 30px;
    border: none;
    font: 600 16px 'Khand', sans-serif;

    background:  #2C30E2;
    color: white;
    font-size: 60px;
    letter-spacing: 1px;
    cursor: pointer;

    box-shadow: 
        0 8px 18px rgba(0,0,255,0.4),
        inset 0 -4px 6px rgba(0,0,0,0.25);
}

.register-btn button:active {
    transform: scale(0.96);
}
</style>
</head>

<body>
  <div id="background">
    <img src="BackgroundStrive.png" alt="Background Image" style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
  </div>

<div class="card">
    <div class="header">
        <div class="logo">
            <img src="Strive.png" alt="Logo">
        </div>
    </div>
        <div class="form">
        <div class="input-box">
            <input type="email" placeholder="E-Mail">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <div class="register-btn">
            <button>REGISTER</button>
        </div>
    </div>
</div>
    <script type="module" src="/src/renderer.ts"></script>
</body>
</html>
