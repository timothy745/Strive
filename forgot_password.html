<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Khand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400;700&family=Khand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <title>Forgot Password</title>
    <style>
        body {
            transition: 0.5s;
        }

        body {
            transform: translateY(100%);
            opacity: 0;
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-out {
            animation: slideOut 0.5s forwards;
        }

        @keyframes slideOut {
            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* overlay putih seperti gambar */
        body:before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.78);
        }

        /* CARD */
        .card {
            position: relative;
            width: 400px;
            border-radius: 22px;
            background: #FFFFFF;
            box-shadow: inset 0px 0px 50px 2px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            z-index: 1;
        }

        /* HEADER */
        .header {
            height: 120px;
            background: linear-gradient(180deg, #000286 0%, #4A4EFF 83%, #8689FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        /* LOGO TEXT */
        .logo {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -115px;
            padding-left: 15px;
            gap: 10px;
        }

        /* FORM */
        .form {
            padding: 20px 30px;
            text-align: center;
        }

        /* INPUT */
        .input-box {
            margin: 18px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            padding-right: 45px;
            border-radius: 40px;
            border: none;
            outline: none;
            font: 100 14px 'Khand', sans-serif;
            background: linear-gradient(to bottom, #e5e5e5, #d6d6d6);

            /* efek halus */
            box-shadow:
                inset 0 2px 6px rgba(0, 0, 0, 0.2),
                inset 0 -2px 3px rgba(255, 255, 255, 0.7);

            text-align: left;
            font-size: 18px;
            color: #666;
        }

        /* BUTTON */
        .login-btn button {
            margin-top: 25px;
            width: 328px;
            border-radius: 30px;
            border: none;
            font: 600 16px 'Khand', sans-serif;
            background: #2C30E2;
            color: white;
            font-size: 60px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .login-btn button:hover {
            background: #FFFFFF;
            color: #2C30E2;
            box-shadow: 0 0px 20px rgba(0, 0, 0, 0.2);
        }

        .login-btn button:active {
            transform: scale(0.96);
        }

        /* REGISTER */
        .register {
            margin-top: 18px;
            position: relative;
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .register a {
            color: #2f2fff;
            text-decoration: none;
            font-size: 15px;
        }

        .register a:hover {
            text-decoration: underline;
            cursor: pointer;
        }

        .msg {
            margin-top: 15px;
            font-size: 14px;
            color: red;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.4s ease !important;
        }

        .toast {
            position: fixed;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: #cc0000;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-family: 'Khand', sans-serif;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: top 0.4s ease;
            z-index: 999;
        }

        .toast.show {
            top: 30px;
        }

        .material-symbols-outlined {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }

        .material-symbols-outlined:hover {
            color: #848488;
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 15px;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            z-index: 10;
            font-size: 30px;
            transition: transform 0.2s;
            user-select: none;
        }

        .back-btn:hover {
            transform: scale(1.1);
            transform: translateY(-50%);
            color: #ccc;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const savedUserId = localStorage.getItem('strive_user_id');
        if (savedUserId) {
            try {
                await window.striveAPI.autoLogin(parseInt(savedUserId));
                window.location.href = "beranda.html";
            } catch (err) {
                console.error('Auto-login failed:', err);
            }
        }
    });

    async function pindah1() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        const msg = document.getElementById('msg');
        const btn = document.getElementById('loginBtn');

        if (!email || !password || !confirm) {
            showToast('Semua field harus diisi.', 'error');
            const card = document.querySelector('.card');
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'shake 0.4s ease';
            }, 10);
            return;
        }

        if (password !== confirm) {
            showToast('Password tidak cocok.', 'error');
            const card = document.querySelector('.card');
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'shake 0.4s ease';
            }, 10);
            return;
        }

        btn.disabled = true;
        msg.textContent = '';

        try {
            const result = await window.striveAPI.resetPassword(email, password);
            if (result.success) {
                showToast(result.message, 'success');
                setTimeout(() => {
                    document.body.classList.add("slide-out");
                    setTimeout(() => { window.location.href = "index.html"; }, 100);
                }, 1000);
            } else {
                showToast(result.message, 'error');
                btn.disabled = false;
                const card = document.querySelector('.card');
                card.style.animation = 'none';
                setTimeout(() => {
                    card.style.animation = 'shake 0.4s ease';
                }, 10);
            }
        } catch (err) {
            showToast('Gagal terhubung ke server.', 'error');
            btn.disabled = false;
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') pindah3();

    });

    function pindah2() {
        document.body.classList.add("slide-out");
        setTimeout(() => {
            window.location.href = "registasi.html";
        }, 100);
    }
    function pindah3() {
        document.body.classList.add("slide-out");
        setTimeout(() => {
            window.location.href = "beranda.html";
        }, 100);
    }
    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = type === 'success' ? '#00f024' : '#cc0000';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 750);
    }
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility_off';
        }
    }

    function goBack() {
        document.body.classList.add("slide-out");
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    }
</script>

<body>
    <div class="toast" id="toast"></div>
    <div id="background">
        <img src="BackgroundStrive.png" alt="Background Image"
            style="width: 100%; height: 100%;position: absolute;right: 0px;bottom: 0px;object-fit: cover;">
    </div>

    <div class="card">
        <div class="header">
            <span class="material-symbols-outlined back-btn" onclick="goBack()">arrow_back</span>
            <div class="logo">
                <img src="Strive.png" alt="Logo">
            </div>
        </div>
        <div class="form">
            <div class="input-box">
                <input type="email" id="email" placeholder="E-Mail">
            </div>

            <div class="input-box">
                <input type="password" id="new_password" placeholder="Password Baru">
                <span class="material-symbols-outlined"
                    onclick="togglePassword('new_password', this)">visibility_off</span>
            </div>

            <div class="input-box">
                <input type="password" id="confirm_password" placeholder="Konfirmasi">
                <span class="material-symbols-outlined"
                    onclick="togglePassword('confirm_password', this)">visibility_off</span>
            </div>

            <div class="login-btn">
                <button id="loginBtn" onclick="pindah1()">RESET</button>
            </div>

            <div class="msg" id="msg"></div>
        </div>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
</body>

</html>
